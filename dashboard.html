<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - MockInterview Hub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Inter, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #122033;
      line-height: 1.6;
    }
    .container {
      width: min(1120px, 92%);
      margin: 0 auto;
    }

    /* Header */
    header {
      background: #fff;
      border-bottom: 1px solid #e7eaf3;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
    }
    .logo-bubble {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #5b7cfa, #7c5cff);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-menu {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5b7cfa, #7c5cff);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 1.1rem;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      font-size: 0.95rem;
    }
    .btn-primary {
      background: linear-gradient(90deg, #5b7cfa, #7c5cff);
      color: #fff;
      box-shadow: 0 8px 20px rgba(91, 124, 250, 0.28);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(91, 124, 250, 0.35);
    }
    .btn-secondary {
      background: #eef3ff;
      color: #3450c7;
    }
    .btn-secondary:hover {
      background: #dfe8ff;
    }

      background: #fee2
